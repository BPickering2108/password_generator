<!DOCTYPE html>
<html lang="en-GB" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcanum - Sign out</title>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        plum:     '#7A306C',
                        chalk:    '#FDFFFC',
                        sage:     '#73956F',
                        lavender: '#C59FC9',
                    },
                    fontFamily: {
                        display: ['"DM Serif Display"', 'serif'],
                        body:    ['"DM Sans"', 'sans-serif'],
                        mono:    ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<script>
    const saved = localStorage.getItem('theme') ?? 'dark';
    document.documentElement.classList.toggle('dark', saved === 'dark');
</script>
<main class="max-w-lg mx-auto px-4 py-10 flex flex-col items-center justify-center min-h-screen text-center">
    <p class="font-mono text-xs mb-4" style="color: var(--muted);">See you later</p>
    <h1 class="font-display text-5xl mb-4" style="color: var(--text);">
        Sign out
    </h1>
    <p class="text-sm mb-8" style="color: var(--muted);">
        Are you sure you want to sign out?
    </p>
    <div class="flex gap-3">
        <form method="POST" action="/auth/logout">
            <button type="submit" class="btn-primary" style="width: auto; padding: 0.65rem 1.5rem;">
                Sign out
            </button>
        </form>
        <a href="/admin" class="btn-ghost" style="text-decoration: none;">Cancel</a>
    </div>
</main>
</body>
</html>
