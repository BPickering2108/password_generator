<!DOCTYPE html>
<html lang="en-GB" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcanum - Not Found</title>
    <link rel="stylesheet" href="tailwind.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="max-w-lg mx-auto px-4 py-10 flex flex-col items-center justify-center min-h-screen text-center">
    <p class="font-mono text-xs mb-4" style="color: var(--muted);">404</p>
    <h1 class="font-display text-5xl mb-4" style="color: var(--text);">
        Nothing here
    </h1>
    <p class="text-sm mb-8" style="color: var(--muted);">
        The page you are looking for does not exist.
    </p>
    <a href="/" class="btn-ghost" style="text-decoration: none;">Back to Arcanum</a>
</main>
<script>
    const saved = localStorage.getItem('theme') ?? 'dark';
    document.documentElement.classList.toggle('dark', saved === 'dark');
</script>
</body>
</html>
